<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>CGMH EHRCALC</title>
        <link rel="stylesheet" href="css/main.css" />
        <link rel="stylesheet" href="css/themes/tech-theme.css" />
        <script>
            (function () {
                const params = new URLSearchParams(window.location.search);
                const hasIss = params.has('iss');
                const hasLaunch = params.has('launch');
                const hasCode = params.has('code');

                if (
                    (hasIss || hasLaunch) &&
                    !hasCode &&
                    !window.location.pathname.endsWith('/launch.html')
                ) {
                    window.location.replace(`launch.html?${params.toString()}`);
                }
            })();
        </script>
    </head>

    <body>
        <div class="container main-layout">
            <aside class="sidebar-area">
                <div class="header-top">
                    <h1>CGMH EHRCALC</h1>
                </div>

                <div id="patient-info" class="sidebar-section">Loading patient data...</div>

                <hr />

                <div class="sidebar-controls">
                    <div id="practitioner-info" class="practitioner-info hidden sidebar-section">
                        <span id="practitioner-name">Loading...</span>
                    </div>

                    <div class="search-container sidebar-section">
                        <input type="search" id="search-bar" placeholder="Search calculator..." />
                    </div>

                    <div class="filter-row sidebar-section">
                        <button class="filter-btn active" data-filter="all">All</button>
                        <button class="filter-btn" data-filter="favorites">⭐</button>
                        <button class="filter-btn" data-filter="recent">🕒</button>
                    </div>

                    <div class="select-row sidebar-section">
                        <select id="category-select" title="Category"></select>
                        <select id="sort-select" title="Sort">
                            <option value="a-z">A-Z</option>
                            <option value="most-used">Used</option>
                        </select>
                    </div>

                    <div id="calculator-stats" class="stats-text">Showing 92 / 92</div>
                </div>
            </aside>

            <main class="content-area">
                <div class="list-header">
                    <h2>Available Calculators</h2>
                </div>
                <div id="calculator-list" class="calculator-list"></div>
            </main>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/fhirclient@2.6.3/build/fhir-client.js"></script>
        <script type="module" src="js/main.js"></script>
    </body>
</html>
