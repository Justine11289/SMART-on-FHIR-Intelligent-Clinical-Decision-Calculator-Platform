<!doctype html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />

        <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'self' https://cdn.jsdelivr.net https://*.smarthealthit.org https://*.cerner.com; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://cdn.jsdelivr.net https://*.smarthealthit.org https://*.cerner.com; frame-ancestors 'none'; upgrade-insecure-requests;"
        />

        <title>CGMH EHRCALC - 系統啟動中</title>
    </head>

    <body
        style="
            font-family: sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #f8f9fa;
        "
    >
        <div style="text-align: center">
            <div
                style="
                    border: 4px solid #f3f3f3;
                    border-top: 4px solid #3498db;
                    border-radius: 50%;
                    width: 40px;
                    height: 40px;
                    animation: spin 1s linear infinite;
                    margin: 0 auto 20px;
                "
            ></div>
            <h2 id="status">正在執行安全授權流程...</h2>
            <p id="sub-status" style="color: #666">即將導向至 FHIR 授權頁面</p>
        </div>

        <style>
            @keyframes spin {
                0% {
                    transform: rotate(0deg);
                }
                100% {
                    transform: rotate(360deg);
                }
            }
        </style>

        <script>
            const urlParams = new URLSearchParams(window.location.search);
            let clientId =
                urlParams.get('clientId') ||
                localStorage.getItem('TEMP_CLIENT_ID') ||
                'cc344727-6f90-496c-94fd-c7829aa9a51d';

            window.MEDCALC_CONFIG = {
                fhir: {
                    clientId: clientId,
                    clientSecret:
                        urlParams.get('clientSecret') || localStorage.getItem('TEMP_CLIENT_SECRET'),
                    scope: 'launch launch/patient patient/*.read openid fhirUser online_access',
                    redirectUri: 'index.html'
                }
            };

            if (!window.MEDCALC_CONFIG.fhir.clientId) {
                const inputId = prompt('Input Client ID : ');
                if (inputId) {
                    localStorage.setItem('TEMP_CLIENT_ID', inputId);
                    location.reload();
                }
            }
        </script>

        <script src="https://cdn.jsdelivr.net/npm/fhirclient@2.6.3/build/fhir-client.js"></script>
        <script type="module" src="js/fhir-launch.js"></script>
    </body>
</html>
