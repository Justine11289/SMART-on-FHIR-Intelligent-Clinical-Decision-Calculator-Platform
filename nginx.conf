server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # set $csp "default-src 'self' https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://cdn.jsdelivr.net https://thas.mohw.gov.tw;";

    add_header Content-Security-Policy "default-src 'self' https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://cdn.jsdelivr.net https://thas.mohw.gov.tw https://*.smarthealthit.org https://*.cerner.com;" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 確保 .json 檔案可以被正確讀取
    location ~* \.json$ {
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # 針對 HTML 檔案 (包含 launch.html 與 index.html)
    location ~* \.html$ {
        # 重複寫入 add_header 是為了覆蓋或確保 HTML 檔案有正確的安全標頭
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Content-Security-Policy "default-src 'self' https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://cdn.jsdelivr.net https://thas.mohw.gov.tw https://*.smarthealthit.org https://*.cerner.com;" always;
        try_files $uri /index.html;
    }
}