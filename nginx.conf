server {
    listen 80;
    server_name localhost;
    
    # 隱藏 Nginx 版本資訊
    server_tokens off;
    
    # 根目錄與預設檔案
    root /usr/share/nginx/html;
    index index.html launch.html;

    # 定義統一的安全標頭（包含 THAS 伺服器）
    # 這裡將 CSP 提取出來，避免在不同 location 重複寫錯
    set $csp_policy "default-src 'self' https://cdn.jsdelivr.net https://launch.smarthealthit.org https://thas.mohw.gov.tw; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://cdn.jsdelivr.net https://launch.smarthealthit.org https://*.smarthealthit.org https://*.cerner.com https://thas.mohw.gov.tw;";

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy $csp_policy always;

    # 主要路由邏輯
    location / {
        # 支援 SPA 路由：如果找不到檔案，則轉向 index.html
        try_files $uri $uri/ /index.html;
    }

    # 針對 HTML 檔案的特殊處理（快取控制）
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        
        # 必須在此重複加入安全標頭，因為 Nginx 的 add_header 在 location 塊中會覆蓋全域
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy $csp_policy always;

        # 修正 404 問題：如果特定的 .html 不存在，依然嘗試回退到 index.html
        try_files $uri /index.html;
    }

    # 靜態資源快取（圖片、字體）
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # JS 與 CSS 快取控制
    location ~* \.(js|css)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Content-Security-Policy $csp_policy always;
    }

    # 錯誤頁面設定
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }

    # 禁止存取隱藏檔案 (如 .git)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 啟用 Gzip 壓縮
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}